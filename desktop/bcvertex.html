<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BC Vertex</title>
  <meta name="description" content="Something is being built.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 1;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }


    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 1.6s ease 0.3s forwards;
    }

    .name {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 100;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #fff;
      padding-right: 0.5em;
      opacity: 0;
      animation: fadeUp 1.6s ease 0.7s forwards;
      transition: font-family 0.4s ease;
    }

    @font-face {
      font-family: 'Cormorant';
      font-style: normal;
      font-weight: 300;
      src: url('https://fonts.gstatic.com/s/cormorantgaramond/v16/co3YmX5slCNuHLi8bLeY9MK7whWMhyjYqXtK.woff2') format('woff2');
    }

    .name {
      font-family: 'Cormorant', Georgia, serif;
      font-weight: 300;
      letter-spacing: 0.35em;
      font-size: clamp(32px, 5.5vw, 52px);
      padding-right: 0.35em;
      color: rgba(255,255,255,0.95);
    }

    .rule {
      width: 200px;
      height: 1px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 1.6s ease 1.2s forwards;
    }

    /* static base */
    .rule::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
    }

    /* fuse burn */
    .rule::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(255,255,255,0.15) 60%,
        rgba(255,255,255,0.9) 80%,
        rgba(255,220,100,0.95) 92%,
        transparent 100%
      );
      animation: fuse 3.5s ease-in-out 2s infinite;
    }

    @keyframes fuse {
      0%   { left: -100%; }
      100% { left: 100%; }
    }

    .footer {
      position: fixed;
      bottom: 36px;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 2s ease 2s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="container">
    <div class="eyebrow">Est. 2026</div>
    <h1 class="name">BC Vertex</h1>
    <div class="rule"></div>
  </div>

  <footer class="footer">Something is being built.</footer>

  <script>
    // ── Stars ──
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({ length: 250 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2 + 0.3,
      base:  Math.random() * 0.25 + 0.15,
      amp:   Math.random() * 0.35 + 0.1,
      speed: Math.random() * 0.0006 + 0.0001,
      phase: Math.random() * Math.PI * 2,
    }));

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const alpha = s.base + s.amp * Math.sin(t * s.speed * 1000 + s.phase);
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, alpha)).toFixed(3)})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

  </script>

</body>
</html>
