name: CI + Deploy Mac Mini

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Testes ──────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: test-key-not-real
      TAVILY_API_KEY: test-key-not-real
      ELEVENLABS_API_KEY: test-key-not-real
      DEEPGRAM_API_KEY: test-key-not-real
      API_FOOTBALL_KEY: test-key-not-real

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing portaudio19-dev libsndfile1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Deploy (só em main) ─────────────────────────────────────────────────────
  deploy:
    name: deploy → Mac Mini
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          key: ${{ secrets.MAC_MINI_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /Users/bcvertex/Morgan
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt -q
            launchctl kickstart -k gui/$(id -u)/com.bcvertex.morgan
            sleep 6
            curl -sf http://localhost:8765/health | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy OK — uptime:', d['uptime_s'], 's')"
