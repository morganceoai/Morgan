<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morgan">
<meta name="theme-color" content="#050c18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Morgan</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #050c18;
  --cyan:   #00d4ff;
  --green:  #00ff9d;
  --amber:  #f5a623;
  --violet: #9b6dff;
  --red:    #ff3355;
  --safe-t: env(safe-area-inset-top, 44px);
  --safe-b: env(safe-area-inset-bottom, 34px);
}
html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  background: #020709;
}
body {
  background: radial-gradient(ellipse at 50% 42%, #0a1e3a 0%, #061228 35%, #030a14 70%, #020709 100%);
  font-family: 'SF Mono', 'Courier New', monospace;
  color: var(--cyan);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── CANVAS ── */
#cv { position: fixed; inset: 0; width: 100%; height: 100%; }

/* ── HEADER ── */
.hdr {
  position: fixed; top: 0; left: 0; right: 0;
  padding: var(--safe-t) 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 20;
  background: linear-gradient(to bottom, rgba(5,12,24,0.9) 0%, transparent 100%);
}
.hdr-left { display: flex; flex-direction: column; gap: 1px; }
.hdr-title { font-size: 11px; letter-spacing: 3px; color: rgba(0,212,255,0.9); }
.hdr-sub   { font-size: 8px; letter-spacing: 1.5px; color: rgba(0,212,255,0.35); text-transform: uppercase; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.hdr-time { font-size: 11px; color: rgba(0,212,255,0.6); letter-spacing: 1px; }
.agent-badge {
  font-size: 8px; letter-spacing: 2px; padding: 2px 8px;
  border: 1px solid rgba(0,212,255,0.3); border-radius: 2px;
  color: rgba(0,212,255,0.5);
}

/* ── SIDE PANELS ── */
.panel {
  position: fixed; top: 0; bottom: 0;
  width: 75vw; max-width: 280px; z-index: 15;
  display: flex; flex-direction: column;
  padding-top: calc(var(--safe-t) + 64px);
  padding-bottom: calc(var(--safe-b) + 80px);
  transition: transform .32s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  border-top: none;
}
.panel.open { pointer-events: auto; }
.panel-left  {
  left: 0; transform: translateX(-100%);
  background: linear-gradient(to right, rgba(3,8,18,0.97) 88%, transparent);
  border-right: 1px solid rgba(0,212,255,0.08);
}
.panel-right {
  right: 0; transform: translateX(100%);
  background: linear-gradient(to left, rgba(3,8,18,0.97) 88%, transparent);
  border-left: 1px solid rgba(0,212,255,0.08);
}
.panel-left.open  { transform: translateX(0); }
.panel-right.open { transform: translateX(0); }

.panel-content { flex: 1; overflow-y: auto; padding: 6px 18px; -webkit-overflow-scrolling: touch; }
.panel-content::-webkit-scrollbar { display: none; }

.p-block { margin-bottom: 22px; }
.p-label {
  font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(0,212,255,0.3); margin-bottom: 8px;
  border-bottom: 1px solid rgba(0,212,255,0.06); padding-bottom: 5px;
}
.p-value { font-size: 13px; color: rgba(0,212,255,0.85); letter-spacing: .5px; }
.p-sub   { font-size: 10px; color: rgba(0,212,255,0.4); margin-top: 3px; }
.p-temp  { font-size: 32px; font-weight: 200; color: var(--cyan); letter-spacing: 2px; }

.hier-line {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0;
}
.hier-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.hier-name { font-size: 11px; letter-spacing: .5px; }
.hier-line[data-active="1"] { background: rgba(0,212,255,.08); border-radius: 6px; padding-left: 6px; margin-left: -6px; }
.hier-line[data-active="1"] .hier-dot { transform: scale(1.5); }
.hier-line[data-active="1"] .hier-name { font-weight: 700; }

.op-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(0,212,255,0.06); }
.op-row:last-child { border: none; }
.op-name { font-size: 10px; color: rgba(0,212,255,0.7); }
.op-score { font-size: 9px; color: var(--amber); }

/* PANEL TABS — visíveis mas discretos */
.panel-tab {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 16; width: 28px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; pointer-events: auto;
  background: rgba(0,212,255,0.04);
  border: 1px solid rgba(0,212,255,0.12);
}
.panel-tab-left  { left: 0; border-left: none; border-radius: 0 6px 6px 0; }
.panel-tab-right { right: 0; border-right: none; border-radius: 6px 0 0 6px; }
.tab-arrow { font-size: 13px; color: rgba(0,212,255,0.45); transition: color .2s; }
.panel-tab:active .tab-arrow { color: var(--cyan); }

/* ── CENTRE ── */
.centre {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 5;
}
.state-lbl {
  font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(0,212,255,0.35); margin-bottom: 8px;
  transition: color .3s;
}
body.listening .state-lbl { color: rgba(0,212,255,0.7); }
body.thinking  .state-lbl { color: rgba(245,166,35,0.7); }
body.speaking  .state-lbl { color: rgba(0,255,157,0.7); }

/* ── TRANSCRIPT ── */
.transcript {
  position: fixed; left: 24px; right: 24px;
  bottom: calc(var(--safe-b) + 68px);
  max-height: 140px; overflow-y: auto;
  z-index: 10; pointer-events: none;
  -webkit-overflow-scrolling: touch;
}
.transcript::-webkit-scrollbar { display: none; }
.t-user {
  text-align: right; font-size: 11px;
  color: rgba(0,212,255,0.5); margin-bottom: 6px;
  background: rgba(0,212,255,0.05); padding: 6px 10px; border-radius: 12px 12px 2px 12px;
}
.t-morgan {
  text-align: left; font-size: 11px;
  color: rgba(0,255,157,0.75); margin-bottom: 6px;
  background: rgba(0,255,157,0.05); padding: 6px 10px; border-radius: 12px 12px 12px 2px;
}

/* ── BOTTOM BAR ── */
.bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px var(--safe-b);
  display: flex; align-items: center; gap: 10px;
  z-index: 20;
  background: rgba(5,12,24,0.97);
  pointer-events: auto;
  min-height: calc(60px + var(--safe-b));
}
.inp {
  flex: 1; background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.15); border-radius: 20px;
  color: var(--cyan); font-family: inherit; font-size: 16px;
  padding: 9px 14px; outline: none;
  -webkit-appearance: none;
  transform: scale(1); /* previne zoom iOS */
}
.inp::placeholder { color: rgba(0,212,255,0.25); }
.inp:focus { border-color: rgba(0,212,255,0.4); background: rgba(0,212,255,0.09); }
.btn-voice {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(0,212,255,0.3);
  background: rgba(0,212,255,0.08);
  color: var(--cyan); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s;
}
.btn-voice.active {
  background: rgba(0,255,157,0.12);
  border-color: rgba(0,255,157,0.5);
  box-shadow: 0 0 12px rgba(0,255,157,0.2);
}
.btn-notif {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,212,255,0.04);
  color: rgba(0,212,255,0.35); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s;
}
.btn-notif.on  { color: rgba(0,255,157,0.8); border-color: rgba(0,255,157,0.4); }
.btn-notif.off { color: rgba(245,166,35,0.6); border-color: rgba(245,166,35,0.3); }

/* OVERLAY */
.overlay { display: none; position: fixed; inset: 0; z-index: 14; }
.overlay.active { display: block; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">MORGAN</div>
    <div class="hdr-sub">BC Industries</div>
  </div>
  <div class="hdr-right">
    <div class="agent-badge" id="agentBadge" onclick="cycleAgent()" style="cursor:pointer" title="Toca para mudar de agente">CEO</div>
    <div class="hdr-time" id="clock">--:--</div>
    <div class="status-dot"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<div class="panel panel-left" id="panelLeft">
  <div class="panel-content">
    <div class="p-block">
      <div class="p-label">Hora</div>
      <div class="p-value" id="pTime">--:--:--</div>
      <div class="p-sub" id="pDate">--</div>
    </div>
    <div class="p-block">
      <div class="p-label">Tempo · Moreira de Cónegos</div>
      <div class="p-temp" id="pTemp">--°</div>
      <div class="p-sub" id="pWeather">--</div>
    </div>
    <div class="p-block">
      <div class="p-label">Hierarquia</div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
        <div class="hier-line">
          <div class="hier-dot" style="background:#fff;box-shadow:0 0 5px #fff"></div>
          <div class="hier-name" style="color:rgba(255,255,255,.7)">Vasco Botelho da Costa</div>
        </div>
        <div class="hier-line" style="padding-left:16px;cursor:pointer" onclick="selectAgent('ceo')" id="abtn-ceo">
          <div class="hier-dot" style="background:var(--cyan);box-shadow:0 0 5px var(--cyan)"></div>
          <div class="hier-name" style="color:var(--cyan)">Morgan CEO</div>
        </div>
        <div style="padding-left:32px;display:flex;flex-direction:column;gap:5px">
          <div class="hier-line" style="cursor:pointer" onclick="selectAgent('scout')" id="abtn-scout">
            <div class="hier-dot" style="background:var(--amber);box-shadow:0 0 4px var(--amber)"></div>
            <div class="hier-name" style="color:var(--amber)">Scout</div>
          </div>
          <div class="hier-line" style="cursor:pointer" onclick="selectAgent('coach')" id="abtn-coach">
            <div class="hier-dot" style="background:var(--amber);box-shadow:0 0 4px var(--amber)"></div>
            <div class="hier-name" style="color:var(--amber)">Coach</div>
          </div>
          <div class="hier-line" style="cursor:pointer" onclick="selectAgent('cfo')" id="abtn-cfo">
            <div class="hier-dot" style="background:var(--amber);box-shadow:0 0 4px var(--amber)"></div>
            <div class="hier-name" style="color:var(--amber)">CFO</div>
          </div>
        </div>
      </div>
    </div>
    <div class="p-block">
      <div class="p-label">Próximo Jogo</div>
      <div class="p-value" id="pJogo">--</div>
      <div class="p-sub" id="pJogoData">--</div>
    </div>
    <div class="p-block">
      <div class="p-label" style="display:flex;justify-content:space-between;align-items:center">
        Histórico de Conversa
        <span style="font-size:10px;opacity:.5;cursor:pointer" onclick="loadHistory()">↺</span>
      </div>
      <div id="pHistory" style="max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-top:6px"></div>
    </div>
  </div>
</div>

<div class="panel panel-right" id="panelRight">
  <div class="panel-content">
    <div class="p-block">
      <div class="p-label" style="display:flex;justify-content:space-between;align-items:center">
        Notificações
        <span style="font-size:10px;opacity:.5;cursor:pointer" onclick="loadNotifications()">↺</span>
      </div>
      <div id="pNotifs" style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-top:6px"></div>
    </div>
    <div class="p-block">
      <div class="p-label" style="display:flex;justify-content:space-between;align-items:center">
        Reports Diários
        <span style="font-size:10px;opacity:.5;cursor:pointer" onclick="loadReports()">↺</span>
      </div>
      <div id="pReportList" style="display:flex;flex-direction:column;gap:6px;margin-top:6px"></div>
      <div id="pReportContent" style="margin-top:8px;font-size:11px;color:var(--cyan);opacity:.85;white-space:pre-wrap;max-height:320px;overflow-y:auto;display:none"></div>
    </div>
    <div class="p-block">
      <div class="p-label">Scout — Oportunidades</div>
      <div id="pScout"></div>
    </div>
    <div class="p-block">
      <div class="p-label">Sistema</div>
      <div class="p-sub">Mac Mini · online</div>
      <div class="p-sub" id="pResultado">--</div>
    </div>
  </div>
</div>

<div class="panel-tab panel-tab-left" onclick="togglePanel('left')">
  <div class="tab-arrow" id="tabL">›</div>
</div>
<div class="panel-tab panel-tab-right" onclick="togglePanel('right')">
  <div class="tab-arrow" id="tabR">‹</div>
</div>

<div class="centre">
  <div class="state-lbl" id="stateLbl"></div>
</div>

<div class="transcript" id="transcript"></div>

<div class="bottom">
  <input class="inp" id="inp" type="text" placeholder="Escreve ao Morgan…"
    onkeydown="if(event.key==='Enter')sendText()" autocomplete="off" autocorrect="off">
  <div class="btn-notif" id="btnNotif" onclick="activarNotificacoes()" title="Notificações">🔔</div>
  <div class="btn-voice" id="btnVoice" onclick="startMorgan()">🎙</div>
</div>

<script>
const API = window.location.origin;

window.onunhandledrejection = function(e) {
  const d = document.getElementById('transcript');
  if(d) d.textContent = 'ERRO Promise: '+(e.reason?.message||e.reason);
};

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('pTime').textContent = n.toLocaleTimeString('pt-PT');
  document.getElementById('pDate').textContent = n.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
}
tick(); setInterval(tick, 1000);

// ── CANVAS ──
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize(); window.addEventListener('resize', resize);

// Estado do Morgan
let morganState = 'idle';
const STATE_RGB = { idle:[0,212,255], listening:[0,255,157], thinking:[245,166,35], speaking:[0,255,157] };
let curRGB = [0,212,255];

function lerpRGB(a,b,f){ return a.map((v,i)=>v+(b[i]-v)*f); }
function rgb(c,a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

// Partículas — menos, maiores, mais nítidas
const R0 = Math.min(window.innerWidth, window.innerHeight) * 0.26;
const PARTS = [];
for(let i=0;i<600;i++){
  PARTS.push({
    theta: Math.random()*Math.PI*2,
    phi:   Math.acos(2*Math.random()-1),
    speed: (Math.random()-.5)*.003,
    size:  Math.random()*2.2+0.8,
    alpha: Math.random()*.6+.5,
    bright: Math.random()<.08  // 8% são "estrelas" brilhantes
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  t+=.009;
  const R = R0;

  // Transição de cor
  curRGB = lerpRGB(curRGB, STATE_RGB[morganState]||STATE_RGB.idle, .04);
  const c = curRGB;

  // Pulso base
  const pulse = morganState==='listening' ? .5+.5*Math.sin(t*5)
              : morganState==='thinking'  ? .5+.5*Math.sin(t*9)
              : .5+.5*Math.sin(t*2);

  // ── GLOW exterior difuso (1 camada, menos blur)
  const g1 = ctx.createRadialGradient(cx,cy,R*.3,cx,cy,R*1.8);
  g1.addColorStop(0,rgb(c,.12+.06*pulse));
  g1.addColorStop(.6,rgb(c,.04));
  g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1;
  ctx.beginPath(); ctx.arc(cx,cy,R*1.8,0,Math.PI*2); ctx.fill();

  // ── ANÉIS — mais visíveis e nítidos
  const ringDefs = [
    {r:.40, lw:2,   a:.55+.25*pulse},
    {r:.65, lw:1.2, a:.28+.12*pulse},
    {r:.88, lw:.8,  a:.15+.07*pulse},
    {r:1.0, lw:.5,  a:.08},
  ];
  ringDefs.forEach(({r,lw,a})=>{
    ctx.beginPath(); ctx.arc(cx,cy,R*r,0,Math.PI*2);
    ctx.strokeStyle=rgb(c,a); ctx.lineWidth=lw; ctx.stroke();
  });

  // ── PARTÍCULAS
  for(const p of PARTS){
    p.theta += p.speed + .001*Math.sin(t*.4);
    const x = cx + R*Math.sin(p.phi)*Math.cos(p.theta+t*.1);
    const y = cy + R*Math.sin(p.phi)*Math.sin(p.theta+t*.1)*.44;
    const z = (Math.cos(p.phi)+1)/2;  // 0→back, 1→front
    const depth = .3+.7*z;
    const a = p.alpha*depth;
    const sz = p.size*depth;

    if(p.bright){
      // estrela nítida com halo pequeno
      ctx.beginPath(); ctx.arc(x,y,sz*3,0,Math.PI*2);
      ctx.fillStyle=rgb(c,a*.2); ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2);
      ctx.fillStyle=rgb(c,Math.min(1,a*1.4)); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2);
      ctx.fillStyle=rgb(c,a); ctx.fill();
    }
  }

  // ── NÚCLEO — mais sólido e brilhante
  const cR = R*(.06+.03*pulse);
  // halo interno
  const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,cR*4);
  cg.addColorStop(0,rgb(c,1));
  cg.addColorStop(.25,rgb(c,.8));
  cg.addColorStop(.6,rgb(c,.25+.15*pulse));
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.arc(cx,cy,cR*4,0,Math.PI*2); ctx.fill();
  // ponto sólido central
  ctx.beginPath(); ctx.arc(cx,cy,cR,0,Math.PI*2);
  ctx.fillStyle=rgb([255,255,255],.9+.1*pulse); ctx.fill();

  requestAnimationFrame(draw);
}
draw();

// ── STATE ──
function setState(s) {
  morganState = s;
  document.body.className = s;
  const L = {listening:'A ouvir',thinking:'A pensar',speaking:'A falar'};
  document.getElementById('stateLbl').textContent = L[s]||'';
  document.getElementById('btnVoice').className = 'btn-voice'+(s==='listening'?' active':'');
}

// ── PANELS ──
let openPanel = null;
function togglePanel(side) {
  if (openPanel===side){closePanels();return;}
  closePanels(false); openPanel=side;
  document.getElementById(side==='left'?'panelLeft':'panelRight').classList.add('open');
  document.getElementById('overlay').classList.add('active');
  document.getElementById('tabL').textContent = side==='left'?'‹':'›';
  document.getElementById('tabR').textContent = side==='right'?'›':'‹';
  if (side==='left') loadHistory();
  if (side==='right') { loadNotifications(); loadReports(); }
}
function closePanels(reset=true) {
  document.getElementById('panelLeft').classList.remove('open');
  document.getElementById('panelRight').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  if (reset){openPanel=null;document.getElementById('tabL').textContent='›';document.getElementById('tabR').textContent='‹';}
}

// ── WIDGETS ──
async function loadWidgets() {
  try {
    const d = await fetch(API+'/api/widgets').then(r=>r.json());
    document.getElementById('pTemp').textContent = d.weather?.temp||'--';
    document.getElementById('pWeather').textContent = d.weather?.desc||'';
    if (d.proximo_jogo?.adversario!=='--') {
      document.getElementById('pJogo').textContent = 'vs '+d.proximo_jogo.adversario;
      document.getElementById('pJogoData').textContent = d.proximo_jogo.data+' · '+d.proximo_jogo.competicao;
    }
    if (d.ultimo_resultado?.adversario!=='--')
      document.getElementById('pResultado').textContent = d.ultimo_resultado.adversario+' '+d.ultimo_resultado.resultado;
    const sc=document.getElementById('pScout'); sc.innerHTML='';
    (d.scout?.top||[]).forEach(op=>{
      const r=document.createElement('div'); r.className='op-row';
      r.innerHTML=`<span class="op-name">${op.label}</span><span class="op-score">${op.score}</span>`;
      sc.appendChild(r);
    });
  } catch(e){}
}
loadWidgets(); setInterval(loadWidgets,60000);

// ── HISTÓRICO DE CONVERSA ──
async function loadHistory() {
  const el = document.getElementById('pHistory');
  el.innerHTML = '<div style="opacity:.4;font-size:11px">A carregar…</div>';
  try {

// ── CHAT ──
function showTranscript(u,m) {
  const el=document.getElementById('transcript'); el.innerHTML='';
  if(u){const d=document.createElement('div');d.className='t-user';d.textContent=u;el.appendChild(d);}
  if(m){const d=document.createElement('div');d.className='t-morgan';d.textContent=m;el.appendChild(d);}
}
const AGENTS = ['ceo','cfo','coach','scout'];
const AGENT_LABELS = {ceo:'CEO',cfo:'CFO',coach:'COACH',scout:'SCOUT'};
let _currentAgent = 'ceo';

function _refreshAgentUI(agent){
  document.getElementById('agentBadge').textContent = AGENT_LABELS[agent]||agent.toUpperCase();
  AGENTS.forEach(a=>{
    const btn=document.getElementById('abtn-'+a);
    if(!btn)return;
    btn.dataset.active = a===agent ? '1' : '0';
  });
}

async function selectAgent(agent){
  _currentAgent = agent;
  _refreshAgentUI(agent);
  try{ await fetch(API+'/api/agent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent})}); }catch(e){}
}

async function cycleAgent(){
  const idx=AGENTS.indexOf(_currentAgent);
  await selectAgent(AGENTS[(idx+1)%AGENTS.length]);
}
async function sendText() {
  const inp=document.getElementById('inp');
  const txt=inp.value.trim(); if(!txt)return;
  inp.value=''; showTranscript(txt,''); setState('thinking');
  try {
    const r=await fetch(API+'/api/chat-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt})});
    const reader=r.body.getReader(),dec=new TextDecoder(); let full='';
    setState('speaking');
    while(true){const{done,value}=await reader.read();if(done)break;full+=dec.decode(value,{stream:true});showTranscript(txt,full);}
    setState('idle');
  } catch{showTranscript(txt,'Erro de ligação.');setState('idle');}
}

// ── VOZ HUME ──
let humeWS=null,audioCtx,micStream,scriptProc,playbackCtx,playbackQueue=[],isPlaying=false,inactivityTimer=null;

function resetInactivity(){
  clearTimeout(inactivityTimer);
  inactivityTimer=setTimeout(()=>{if(humeWS)stopMorgan();},3*60*1000);
}
function stopMorgan(){
  if(humeWS){try{humeWS.close(1000,'desligado');}catch(e){}humeWS=null;}
  if(scriptProc){scriptProc.disconnect();scriptProc=null;}
  clearTimeout(inactivityTimer);
  document.getElementById('btnVoice').className='btn-voice';
  setState('idle');
}
async function startMorgan(){
  if(humeWS&&humeWS.readyState===WebSocket.OPEN){stopMorgan();return;}
  if(humeWS){try{humeWS.close();}catch(e){}humeWS=null;}
  if(scriptProc){scriptProc.disconnect();scriptProc=null;}
  document.getElementById('btnVoice').className='btn-voice active';
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,sampleRate:16000},video:false});
    // iOS Safari não suporta sampleRate:16000 no AudioContext — usa o nativo e reamostrar
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    playbackCtx=new(window.AudioContext||window.webkitAudioContext)();
    await audioCtx.resume();
    await playbackCtx.resume();
    const wsUrl=API.replace('https','wss').replace('http','ws')+'/ws/hume';
    humeWS=new WebSocket(wsUrl);
    humeWS.binaryType='arraybuffer';
    humeWS.onopen=()=>{setState('listening');resetInactivity();startCapture();};
    humeWS.onmessage=ev=>{
      if(ev.data instanceof ArrayBuffer){queueAudio(ev.data);return;}
      try{
        const d=JSON.parse(ev.data);
        if(d.type==='user'){showTranscript(d.text,'');setState('thinking');resetInactivity();}
        if(d.type==='agent'){showTranscript('',d.text);setState('speaking');}
        if(d.type==='done'){setTimeout(()=>setState('listening'),600);resetInactivity();}
      }catch(e){}
    };
    humeWS.onclose=(ev)=>{
      if(scriptProc){scriptProc.disconnect();scriptProc=null;}
      clearTimeout(inactivityTimer);humeWS=null;
      document.getElementById('btnVoice').className='btn-voice';setState('idle');
    };
    humeWS.onerror=()=>{document.getElementById('btnVoice').className='btn-voice';setState('idle');};
  }catch(e){console.error(e);document.getElementById('btnVoice').className='btn-voice';setState('idle');}
}
function _resampleTo16k(f32, fromRate){
  // reamostrar de fromRate (ex:44100) para 16000 Hz
  if(fromRate===16000)return f32;
  const ratio=fromRate/16000;
  const outLen=Math.round(f32.length/ratio);
  const out=new Float32Array(outLen);
  for(let i=0;i<outLen;i++)out[i]=f32[Math.min(Math.round(i*ratio),f32.length-1)];
  return out;
}
function _f32ToInt16(f32){
  const out=new Int16Array(f32.length);
  for(let i=0;i<f32.length;i++)out[i]=Math.max(-32768,Math.min(32767,Math.round(f32[i]*32767)));
  return out;
}
async function startCapture(){
  if(scriptProc)return;
  const nativeRate=audioCtx.sampleRate; // 44100 ou 48000 no iOS
  const src=audioCtx.createMediaStreamSource(micStream);
  const CHUNK=4096;
  try{
    // AudioWorklet — envia amostras nativas, JS principal faz resample
    const code=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c)this.port.postMessage(c.slice());return true;}};registerProcessor('p',P);`;
    const blob=new Blob([code],{type:'application/javascript'});
    const burl=URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(burl);
    URL.revokeObjectURL(burl);
    const node=new AudioWorkletNode(audioCtx,'p');
    node.port.onmessage=ev=>{
      if(!humeWS||humeWS.readyState!==1)return;
      const resampled=_resampleTo16k(ev.data,nativeRate);
      humeWS.send(_f32ToInt16(resampled).buffer);
    };
    src.connect(node);
    scriptProc=node;
  }catch(e){
    // fallback ScriptProcessor
    const proc=audioCtx.createScriptProcessor(CHUNK,1,1);
    proc.onaudioprocess=ev=>{
      if(!humeWS||humeWS.readyState!==1)return;
      const resampled=_resampleTo16k(ev.inputBuffer.getChannelData(0),nativeRate);
      humeWS.send(_f32ToInt16(resampled).buffer);
    };
    src.connect(proc);proc.connect(audioCtx.destination);
    scriptProc=proc;
  }
}
function queueAudio(buf){playbackQueue.push(buf);if(!isPlaying)playNext();}
async function playNext(){
  if(!playbackQueue.length){isPlaying=false;return;}
  isPlaying=true;
  const buf=playbackQueue.shift();
  try{
    const decoded=await playbackCtx.decodeAudioData(buf.slice(0));
    const src=playbackCtx.createBufferSource();
    src.buffer=decoded;src.connect(playbackCtx.destination);src.onended=playNext;src.start();
  }catch(e){
    try{
      const i16=new Int16Array(buf),f32=new Float32Array(i16.length);
      for(let i=0;i<i16.length;i++)f32[i]=i16[i]/32768;
      const ab=playbackCtx.createBuffer(1,f32.length,16000);ab.copyToChannel(f32,0);
      const src=playbackCtx.createBufferSource();
      src.buffer=ab;src.connect(playbackCtx.destination);src.onended=playNext;src.start();
    }catch(e2){playNext();}
  }
}

// ── Service Worker + Push Notifications ──────────────────────────────────────

let _swReg = null;

function _vapidKeyToUint8(key) {
  const pad = key + '==='.slice(0, (4 - key.length % 4) % 4);
  const bin = atob(pad.replace(/-/g,'+').replace(/_/g,'/'));
  return new Uint8Array([...bin].map(c => c.charCodeAt(0)));
}

async function _subscribeAndSend(reg) {
  const res   = await fetch(`${API}/api/push/vapid-public-key`);
  const {key} = await res.json();
  const sub   = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: _vapidKeyToUint8(key)
  });
  await fetch(`${API}/api/push/subscribe`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(sub.toJSON())
  });
  return sub;
}

function _updateNotifBtn(state) {
  // state: 'on' | 'off' | 'idle'
  const btn = document.getElementById('btnNotif');
  if (!btn) return;
  btn.className = 'btn-notif' + (state === 'on' ? ' on' : state === 'off' ? ' off' : '');
  btn.title = state === 'on' ? 'Notificações activas' : state === 'off' ? 'Notificações bloqueadas' : 'Activar notificações';
}

async function _initPush(reg) {
  if (!('PushManager' in window)) return;
  if (Notification.permission === 'denied') { _updateNotifBtn('off'); return; }

  // Já subscrito — re-enviar ao servidor e marcar como activo
  const existing = await reg.pushManager.getSubscription().catch(()=>null);
  if (existing) {
    await fetch(`${API}/api/push/subscribe`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(existing.toJSON())
    }).catch(()=>{});
    _updateNotifBtn('on');
    return;
  }

  // Ainda não subscrito — mostrar botão em espera
  if (Notification.permission === 'granted') {
    // Permissão dada mas sem subscrição (ex: reinstalou a PWA) — subscrever silenciosamente
    await _subscribeAndSend(reg).catch(()=>{});
    _updateNotifBtn('on');
  }
  // Se 'default', o botão fica no estado neutro até o utilizador carregar
}

async function activarNotificacoes() {
  if (!_swReg) return;
  if (Notification.permission === 'denied') {
    alert('As notificações estão bloqueadas. Vai a Definições → morgan.bcvertex.com → Notificações e permite.');
    return;
  }
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') { _updateNotifBtn('off'); return; }
    await _subscribeAndSend(_swReg);
    _updateNotifBtn('on');
    // Enviar notificação de confirmação
    await fetch(`${API}/api/push/test`).catch(()=>{});
  } catch(e) {
    console.warn('[Morgan] Push falhou:', e);
  }
}

if ('serviceWorker' in navigator) {
  // desregistar SW antigos (sw.js v1-v5) para limpar cache
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => { if (!r.active?.scriptURL?.includes('sw2.js')) r.unregister(); });
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));

  navigator.serviceWorker.register('/app/sw2.js')
    .then(reg => {
      _swReg = reg;
      const activate = () => _initPush(reg);
      if (reg.active) activate();
      else (reg.installing || reg.waiting)?.addEventListener('statechange', e => {
        if (e.target.state === 'activated') activate();
      });
    })
    .catch(()=>{});
}
