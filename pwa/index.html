<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morgan">
<meta name="theme-color" content="#050c18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Morgan</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #050c18;
  --cyan:   #00d4ff;
  --green:  #00ff9d;
  --amber:  #f5a623;
  --violet: #9b6dff;
  --red:    #ff3355;
  --safe-t: env(safe-area-inset-top, 44px);
  --safe-b: env(safe-area-inset-bottom, 20px);
}
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: radial-gradient(ellipse at 50% 42%, #0a1e3a 0%, #061228 35%, #030a14 70%, #020709 100%);
  font-family: 'SF Mono', 'Courier New', monospace;
  color: var(--cyan);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── CANVAS ── */
#cv { position: fixed; inset: 0; width: 100%; height: 100%; }

/* ── HEADER ── */
.hdr {
  position: fixed; top: 0; left: 0; right: 0;
  padding: var(--safe-t) 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 20;
  background: linear-gradient(to bottom, rgba(5,12,24,0.9) 0%, transparent 100%);
}
.hdr-left { display: flex; flex-direction: column; gap: 1px; }
.hdr-title { font-size: 11px; letter-spacing: 3px; color: rgba(0,212,255,0.9); }
.hdr-sub   { font-size: 8px; letter-spacing: 1.5px; color: rgba(0,212,255,0.35); text-transform: uppercase; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.hdr-time { font-size: 11px; color: rgba(0,212,255,0.6); letter-spacing: 1px; }
.agent-badge {
  font-size: 8px; letter-spacing: 2px; padding: 2px 8px;
  border: 1px solid rgba(0,212,255,0.3); border-radius: 2px;
  color: rgba(0,212,255,0.5);
}

/* ── SIDE PANELS ── */
.panel {
  position: fixed; top: 0; bottom: 0;
  width: 220px; z-index: 15;
  display: flex; flex-direction: column;
  padding-top: calc(var(--safe-t) + 60px);
  padding-bottom: calc(var(--safe-b) + 80px);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.panel.open { pointer-events: auto; }
.panel-left  { left: 0;  transform: translateX(-100%); background: linear-gradient(to right, rgba(5,12,24,0.95) 80%, transparent); }
.panel-right { right: 0; transform: translateX(100%);  background: linear-gradient(to left,  rgba(5,12,24,0.95) 80%, transparent); }
.panel-left.open  { transform: translateX(0); }
.panel-right.open { transform: translateX(0); }

.panel-content { flex: 1; overflow-y: auto; padding: 0 14px; -webkit-overflow-scrolling: touch; }
.panel-content::-webkit-scrollbar { display: none; }

.p-block { margin-bottom: 18px; }
.p-label { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,212,255,0.25); margin-bottom: 6px; }
.p-value { font-size: 12px; color: rgba(0,212,255,0.75); letter-spacing: .5px; }
.p-sub   { font-size: 9px; color: rgba(0,212,255,0.35); margin-top: 2px; }
.p-temp  { font-size: 28px; font-weight: 200; color: var(--cyan); letter-spacing: 2px; }

.hier-line {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0;
}
.hier-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.hier-name { font-size: 9px; color: rgba(0,212,255,0.55); }

.op-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(0,212,255,0.05); }
.op-row:last-child { border: none; }
.op-name { font-size: 9px; color: rgba(0,212,255,0.6); }
.op-score { font-size: 8px; color: var(--amber); }

/* PANEL TABS */
.panel-tab {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 16; width: 20px; height: 60px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; pointer-events: auto;
}
.panel-tab-left  { left: 0; }
.panel-tab-right { right: 0; }
.tab-arrow { font-size: 10px; color: rgba(0,212,255,0.3); transition: color .2s; }
.panel-tab:active .tab-arrow { color: var(--cyan); }

/* ── CENTRE ── */
.centre {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 5;
}
.state-lbl {
  font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(0,212,255,0.35); margin-bottom: 8px;
  transition: color .3s;
}
body.listening .state-lbl { color: rgba(0,212,255,0.7); }
body.thinking  .state-lbl { color: rgba(245,166,35,0.7); }
body.speaking  .state-lbl { color: rgba(0,255,157,0.7); }

/* ── TRANSCRIPT ── */
.transcript {
  position: fixed; left: 24px; right: 24px;
  bottom: calc(var(--safe-b) + 68px);
  max-height: 140px; overflow-y: auto;
  z-index: 10; pointer-events: none;
  -webkit-overflow-scrolling: touch;
}
.transcript::-webkit-scrollbar { display: none; }
.t-user {
  text-align: right; font-size: 11px;
  color: rgba(0,212,255,0.5); margin-bottom: 6px;
  background: rgba(0,212,255,0.05); padding: 6px 10px; border-radius: 12px 12px 2px 12px;
}
.t-morgan {
  text-align: left; font-size: 11px;
  color: rgba(0,255,157,0.75); margin-bottom: 6px;
  background: rgba(0,255,157,0.05); padding: 6px 10px; border-radius: 12px 12px 12px 2px;
}

/* ── BOTTOM BAR ── */
.bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px calc(var(--safe-b) + 8px);
  display: flex; align-items: center; gap: 10px;
  z-index: 20;
  background: linear-gradient(to top, rgba(5,12,24,0.95) 0%, transparent 100%);
  pointer-events: auto;
}
.inp {
  flex: 1; background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.15); border-radius: 20px;
  color: var(--cyan); font-family: inherit; font-size: 12px;
  padding: 9px 14px; outline: none;
  -webkit-appearance: none;
}
.inp::placeholder { color: rgba(0,212,255,0.25); }
.inp:focus { border-color: rgba(0,212,255,0.4); background: rgba(0,212,255,0.09); }
.btn-voice {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(0,212,255,0.3);
  background: rgba(0,212,255,0.08);
  color: var(--cyan); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s;
}
.btn-voice.active {
  background: rgba(0,255,157,0.12);
  border-color: rgba(0,255,157,0.5);
  box-shadow: 0 0 12px rgba(0,255,157,0.2);
}

/* OVERLAY */
.overlay { display: none; position: fixed; inset: 0; z-index: 14; }
.overlay.active { display: block; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">MORGAN</div>
    <div class="hdr-sub">BC Industries</div>
  </div>
  <div class="hdr-right">
    <div class="agent-badge" id="agentBadge">CEO</div>
    <div class="hdr-time" id="clock">--:--</div>
    <div class="status-dot"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<div class="panel panel-left" id="panelLeft">
  <div class="panel-content">
    <div class="p-block">
      <div class="p-label">Hora</div>
      <div class="p-value" id="pTime">--:--:--</div>
      <div class="p-sub" id="pDate">--</div>
    </div>
    <div class="p-block">
      <div class="p-label">Tempo</div>
      <div class="p-temp" id="pTemp">--°</div>
      <div class="p-sub" id="pWeather">--</div>
    </div>
    <div class="p-block">
      <div class="p-label">Hierarquia</div>
      <div class="hier-line"><div class="hier-dot" style="background:#fff;box-shadow:0 0 4px #fff"></div><div class="hier-name">Vasco Botelho da Costa</div></div>
      <div class="hier-line" style="padding-left:14px"><div class="hier-dot" style="background:var(--cyan);box-shadow:0 0 4px var(--cyan)"></div><div class="hier-name">Morgan CEO</div></div>
      <div class="hier-line" style="padding-left:28px"><div class="hier-dot" style="background:var(--amber);box-shadow:0 0 4px var(--amber)"></div><div class="hier-name">Scout · Coach · CFO</div></div>
    </div>
    <div class="p-block">
      <div class="p-label">Próximo Jogo</div>
      <div class="p-value" id="pJogo">--</div>
      <div class="p-sub" id="pJogoData">--</div>
    </div>
  </div>
</div>

<div class="panel panel-right" id="panelRight">
  <div class="panel-content">
    <div class="p-block">
      <div class="p-label">Scout — Oportunidades</div>
      <div id="pScout"></div>
    </div>
    <div class="p-block">
      <div class="p-label">Último Resultado</div>
      <div class="p-value" id="pResultado">--</div>
    </div>
    <div class="p-block">
      <div class="p-label">Sistema</div>
      <div class="p-sub">Mac Mini · online</div>
      <div class="p-sub">Morgan v2 · PT-EU</div>
    </div>
  </div>
</div>

<div class="panel-tab panel-tab-left" onclick="togglePanel('left')">
  <div class="tab-arrow" id="tabL">›</div>
</div>
<div class="panel-tab panel-tab-right" onclick="togglePanel('right')">
  <div class="tab-arrow" id="tabR">‹</div>
</div>

<div class="centre">
  <div class="state-lbl" id="stateLbl"></div>
</div>

<div class="transcript" id="transcript"></div>

<div class="bottom">
  <input class="inp" id="inp" type="text" placeholder="Escreve ao Morgan…"
    onkeydown="if(event.key==='Enter')sendText()" autocomplete="off" autocorrect="off">
  <div class="btn-voice" id="btnVoice" onclick="startMorgan()">🎙</div>
</div>

<script>
const API = window.location.origin;

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('pTime').textContent = n.toLocaleTimeString('pt-PT');
  document.getElementById('pDate').textContent = n.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
}
tick(); setInterval(tick, 1000);

// ── CANVAS ──
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, t = 0;
const particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize(); window.addEventListener('resize', resize);

const R = Math.min(window.innerWidth, window.innerHeight) * 0.22;
for (let i = 0; i < 800; i++) {
  particles.push({
    theta: Math.random() * Math.PI * 2,
    phi:   Math.acos(2 * Math.random() - 1),
    speed: (Math.random() - .5) * .003,
    size:  Math.random() * 1.2 + .3,
    alpha: Math.random() * .6 + .2,
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += .008;
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.4);
  g.addColorStop(0,'rgba(0,212,255,0.07)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,R*1.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,R*.55,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,212,255,${.08+.04*Math.sin(t)})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,212,255,${.04+.02*Math.sin(t*1.3)})`; ctx.lineWidth=.5; ctx.stroke();
  for (const p of particles) {
    p.theta += p.speed + .002*Math.sin(t*.5);
    const x = cx + R*Math.sin(p.phi)*Math.cos(p.theta+t*.12);
    const y = cy + R*Math.sin(p.phi)*Math.sin(p.theta+t*.12)*.45;
    const z = Math.cos(p.phi);
    const a = p.alpha*(.3+.7*(z+1)/2);
    ctx.beginPath(); ctx.arc(x,y,p.size*(z+1)/2,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,212,255,${a})`; ctx.fill();
  }
  const pulse = .5+.5*Math.sin(t*2.5);
  ctx.beginPath(); ctx.arc(cx,cy,R*(.08+.03*pulse),0,Math.PI*2);
  ctx.fillStyle=`rgba(0,212,255,${.4+.3*pulse})`; ctx.fill();
  requestAnimationFrame(draw);
}
draw();

// ── STATE ──
let morganState = 'idle';
function setState(s) {
  morganState = s;
  document.body.className = s;
  const L = {listening:'A ouvir',thinking:'A pensar',speaking:'A falar'};
  document.getElementById('stateLbl').textContent = L[s]||'';
  document.getElementById('btnVoice').className = 'btn-voice'+(s==='listening'?' active':'');
}

// ── PANELS ──
let openPanel = null;
function togglePanel(side) {
  if (openPanel===side){closePanels();return;}
  closePanels(false); openPanel=side;
  document.getElementById(side==='left'?'panelLeft':'panelRight').classList.add('open');
  document.getElementById('overlay').classList.add('active');
  document.getElementById('tabL').textContent = side==='left'?'‹':'›';
  document.getElementById('tabR').textContent = side==='right'?'›':'‹';
}
function closePanels(reset=true) {
  document.getElementById('panelLeft').classList.remove('open');
  document.getElementById('panelRight').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  if (reset){openPanel=null;document.getElementById('tabL').textContent='›';document.getElementById('tabR').textContent='‹';}
}

// ── WIDGETS ──
async function loadWidgets() {
  try {
    const d = await fetch(API+'/api/widgets').then(r=>r.json());
    document.getElementById('pTemp').textContent = d.weather?.temp||'--';
    document.getElementById('pWeather').textContent = d.weather?.desc||'';
    if (d.proximo_jogo?.adversario!=='--') {
      document.getElementById('pJogo').textContent = 'vs '+d.proximo_jogo.adversario;
      document.getElementById('pJogoData').textContent = d.proximo_jogo.data+' · '+d.proximo_jogo.competicao;
    }
    if (d.ultimo_resultado?.adversario!=='--')
      document.getElementById('pResultado').textContent = d.ultimo_resultado.adversario+' '+d.ultimo_resultado.resultado;
    const sc=document.getElementById('pScout'); sc.innerHTML='';
    (d.scout?.top||[]).forEach(op=>{
      const r=document.createElement('div'); r.className='op-row';
      r.innerHTML=`<span class="op-name">${op.label}</span><span class="op-score">${op.score}</span>`;
      sc.appendChild(r);
    });
  } catch(e){}
}
loadWidgets(); setInterval(loadWidgets,60000);

// ── CHAT ──
function showTranscript(u,m) {
  const el=document.getElementById('transcript'); el.innerHTML='';
  if(u){const d=document.createElement('div');d.className='t-user';d.textContent=u;el.appendChild(d);}
  if(m){const d=document.createElement('div');d.className='t-morgan';d.textContent=m;el.appendChild(d);}
}
async function sendText() {
  const inp=document.getElementById('inp');
  const txt=inp.value.trim(); if(!txt)return;
  inp.value=''; showTranscript(txt,''); setState('thinking');
  try {
    const r=await fetch(API+'/api/chat-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt})});
    const reader=r.body.getReader(),dec=new TextDecoder(); let full='';
    setState('speaking');
    while(true){const{done,value}=await reader.read();if(done)break;full+=dec.decode(value,{stream:true});showTranscript(txt,full);}
    setState('idle');
  } catch{showTranscript(txt,'Erro de ligação.');setState('idle');}
}

// ── VOZ HUME ──
let humeWS=null,audioCtx,micStream,scriptProc,playbackCtx,playbackQueue=[],isPlaying=false,inactivityTimer=null;

function resetInactivity(){
  clearTimeout(inactivityTimer);
  inactivityTimer=setTimeout(()=>{if(humeWS)stopMorgan();},3*60*1000);
}
function stopMorgan(){
  if(humeWS){try{humeWS.close(1000,'desligado');}catch(e){}humeWS=null;}
  if(scriptProc){scriptProc.disconnect();scriptProc=null;}
  clearTimeout(inactivityTimer);
  document.getElementById('btnVoice').className='btn-voice';
  setState('idle');
}
async function startMorgan(){
  if(humeWS&&humeWS.readyState===WebSocket.OPEN){stopMorgan();return;}
  if(humeWS){try{humeWS.close();}catch(e){}humeWS=null;}
  if(scriptProc){scriptProc.disconnect();scriptProc=null;}
  document.getElementById('btnVoice').className='btn-voice active';
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    playbackCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    const wsUrl=API.replace('https','wss').replace('http','ws')+'/ws/hume';
    humeWS=new WebSocket(wsUrl);
    humeWS.binaryType='arraybuffer';
    humeWS.onopen=()=>{setState('listening');resetInactivity();startCapture();};
    humeWS.onmessage=ev=>{
      if(ev.data instanceof ArrayBuffer){queueAudio(ev.data);return;}
      try{
        const d=JSON.parse(ev.data);
        if(d.type==='user'){showTranscript(d.text,'');setState('thinking');resetInactivity();}
        if(d.type==='agent'){showTranscript('',d.text);setState('speaking');}
        if(d.type==='done'){setTimeout(()=>setState('listening'),600);resetInactivity();}
      }catch(e){}
    };
    humeWS.onclose=(ev)=>{
      if(scriptProc){scriptProc.disconnect();scriptProc=null;}
      clearTimeout(inactivityTimer);humeWS=null;
      document.getElementById('btnVoice').className='btn-voice';setState('idle');
    };
    humeWS.onerror=()=>{document.getElementById('btnVoice').className='btn-voice';setState('idle');};
  }catch(e){console.error(e);document.getElementById('btnVoice').className='btn-voice';setState('idle');}
}
function startCapture(){
  if(scriptProc)return;
  const src=audioCtx.createMediaStreamSource(micStream);
  scriptProc=audioCtx.createScriptProcessor(4096,1,1);
  src.connect(scriptProc);scriptProc.connect(audioCtx.destination);
  scriptProc.onaudioprocess=e=>{
    if(!humeWS||humeWS.readyState!==1)return;
    const inp=e.inputBuffer.getChannelData(0),out=new Int16Array(inp.length);
    for(let i=0;i<inp.length;i++)out[i]=Math.max(-32768,Math.min(32767,Math.round(inp[i]*32767)));
    humeWS.send(out.buffer);
  };
}
function queueAudio(buf){playbackQueue.push(buf);if(!isPlaying)playNext();}
async function playNext(){
  if(!playbackQueue.length){isPlaying=false;return;}
  isPlaying=true;
  const buf=playbackQueue.shift();
  try{
    const decoded=await playbackCtx.decodeAudioData(buf.slice(0));
    const src=playbackCtx.createBufferSource();
    src.buffer=decoded;src.connect(playbackCtx.destination);src.onended=playNext;src.start();
  }catch(e){
    try{
      const i16=new Int16Array(buf),f32=new Float32Array(i16.length);
      for(let i=0;i<i16.length;i++)f32[i]=i16[i]/32768;
      const ab=playbackCtx.createBuffer(1,f32.length,16000);ab.copyToChannel(f32,0);
      const src=playbackCtx.createBufferSource();
      src.buffer=ab;src.connect(playbackCtx.destination);src.onended=playNext;src.start();
    }catch(e2){playNext();}
  }
}

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('/pwa/sw.js').catch(()=>{});
</script>
</body>
</html>
